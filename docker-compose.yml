version: '3.8'

services:
  aarogya:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=5000
    volumes:
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    restart: unless-stopped
    networks:
      - aarogya-network

  # Optional: Redis cache (uncomment if using caching)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   networks:
  #     - aarogya-network

  # Optional: MongoDB (uncomment if using database)
  # mongodb:
  #   image: mongo:7
  #   ports:
  #     - "27017:27017"
  #   environment:
  #     - MONGO_INITDB_DATABASE=aarogya
  #   volumes:
  #     - mongo-data:/data/db
  #   restart: unless-stopped
  #   networks:
  #     - aarogya-network

networks:
  aarogya-network:
    driver: bridge

